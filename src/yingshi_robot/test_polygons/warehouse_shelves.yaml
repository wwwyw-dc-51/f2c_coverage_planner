# 仓库 + 货架场景 —— 矩形区域内有多列条状货架（障碍物）
#
# 整体仓库 30x15 = 450 m²
# 4 组货架，每组 1.5m 宽 x 11m 长，纵向排列
# 货架总面积 = 4 x (1.5 x 11) = 66 m²
# 有效作业面积 = 450 - 66 = 384 m²
#
# 几何布局（仓库 30宽 x 15高）:
#   货架1: x=[4, 5.5],  y=[2, 13]
#   货架2: x=[9, 10.5], y=[2, 13]
#   货架3: x=[14,15.5], y=[2, 13]
#   货架4: x=[19,20.5], y=[2, 13]
#   (右侧 x=[22,30] 留出 8m 宽的开阔区，模拟装卸区)
#
# 特点：这是最考验算法的场景。
#   - 货架把仓库切成"货架间通道"(纵向长条) + "开阔区"
#   - 通道是纵向长条(长宽比大)，强制沿某方向铺会碎
#   - 开阔区是矩形，怎么铺都行
#   - 测试算法能否自适应：通道沿纵向，开阔区沿横向
polygon:
  - [0.0, 0.0]
  - [30.0, 0.0]
  - [30.0, 15.0]
  - [0.0, 15.0]

holes:
  - - [4.0, 2.0]
    - [5.5, 2.0]
    - [5.5, 13.0]
    - [4.0, 13.0]
  - - [9.0, 2.0]
    - [10.5, 2.0]
    - [10.5, 13.0]
    - [9.0, 13.0]
  - - [14.0, 2.0]
    - [15.5, 2.0]
    - [15.5, 13.0]
    - [14.0, 13.0]
  - - [19.0, 2.0]
    - [20.5, 2.0]
    - [20.5, 13.0]
    - [19.0, 13.0]
