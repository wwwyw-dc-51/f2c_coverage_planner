# U 型长廊 —— 细长的 U 形通道，模拟走廊类清扫区域
#
# 整体外框 40x12
# 左竖条: x=[0,4],  y=[0,12]  (4x12 = 48 m²)
# 右竖条: x=[36,40],y=[0,12]  (4x12 = 48 m²)
# 底横条: x=[0,40], y=[0,3]   (40x3 = 120 m²)
# 重叠(左右竖条与底横条): 2 x (4x3) = 24 m²
# 有效面积 = 48 + 48 + 120 - 24 = 192 m²
#
# 几何：凹 U 形，凹点 (4,3) 和 (36,3)
#   预期：凹分解切成 左竖条 + 右竖条 + 底横条 3 块
#   - 左右竖条(4x12)：longest edge 竖直 → 竖向铺
#   - 底横条(40x3)：longest edge 水平 → 横向铺
#   验证长廊场景的方向自适应
polygon:
  - [0.0, 0.0]
  - [40.0, 0.0]
  - [40.0, 12.0]
  - [36.0, 12.0]
  - [36.0, 3.0]
  - [4.0, 3.0]
  - [4.0, 12.0]
  - [0.0, 12.0]

holes: []
