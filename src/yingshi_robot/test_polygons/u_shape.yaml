# U 字形区域 —— 三面围合，底部开口，模拟被墙体半包围的作业区
#
# 整体外框 20x20 = 400 m²，中间挖掉一个 12x14 的凹槽（从顶部向下凹）
# 有效面积 = 400 - 168 = 232 m²
#
# 几何：
#   外框: [0,0]-[20,0]-[20,20]-[0,20]  (整体20x20)
#   U形: 左竖条(0-4, 0-20) + 右竖条(16-20, 0-20) + 底横条(0-20, 0-6)
#   凹槽: x=[4,16], y=[6,20]  (12宽 x 14高 = 168m² 的空缺)
#
# 特点：两条长竖条 + 一条底横条，是经典的 U 形通道
polygon:
  - [0.0, 0.0]
  - [20.0, 0.0]
  - [20.0, 20.0]
  - [16.0, 20.0]
  - [16.0, 6.0]
  - [4.0, 6.0]
  - [4.0, 20.0]
  - [0.0, 20.0]

holes: []
