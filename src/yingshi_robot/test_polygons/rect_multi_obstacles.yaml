# 矩形带多障碍物 —— 对照基准，验证算法在"规整区域+离散障碍"的表现
#
# 整体 20x15 = 300 m²
# 3 个小障碍物（模拟柱子、设备），分散布置
# 障碍面积 = 2x2 + 2x2 + 3x2 = 14 m²
# 有效面积 = 300 - 14 = 286 m²
#
# 几何布局：
#   障碍1: x=[5,7],  y=[4,6]   (2x2 方柱)
#   障碍2: x=[13,15],y=[4,6]   (2x2 方柱)
#   障碍3: x=[9,12], y=[10,12] (3x2 长设备)
#
# 特点：主体是规整矩形，障碍小而分散。
#   预期：如果算法好，应该整体水平铺 swath，障碍处自然断开，几乎不碎。
#   这张图是"应该表现最好"的场景，用来定算法的能力上限。
polygon:
  - [0.0, 0.0]
  - [20.0, 0.0]
  - [20.0, 15.0]
  - [0.0, 15.0]

holes:
  - - [5.0, 4.0]
    - [7.0, 4.0]
    - [7.0, 6.0]
    - [5.0, 6.0]
  - - [13.0, 4.0]
    - [15.0, 4.0]
    - [15.0, 6.0]
    - [13.0, 6.0]
  - - [9.0, 10.0]
    - [12.0, 10.0]
    - [12.0, 12.0]
    - [9.0, 12.0]
