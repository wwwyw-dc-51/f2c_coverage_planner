# 碎块测试场景 —— 密集货架阵列，专门复现 hole 切分的小碎块
#
# 整体 17.5x18 = 315 m²
# 12 个货架(2x3)排成 4列 x 3行 网格，货架间距 1.5m
# 货架总面积 = 12 x (2x3) = 72 m²
# 有效面积 = 315 - 72 = 243 m²
#
# 特点：密集 hole 网格，专门触发 hole 切分的碎片问题：
#   - 每个货架 hole 的包围盒切线(x=minX/maxX, y=minY/maxY)互相交叉
#   - 货架之间 1.5m 通道被切成棋盘格小段
#   - 预期会产生大量小碎块(通道夹缝、货架边缘窄条)
#   - 用来评估是否需要"最小 cell 面积阈值"(S1) 过滤小碎块
polygon:
  - [0.0, 0.0]
  - [17.5, 0.0]
  - [17.5, 18.0]
  - [0.0, 18.0]

holes:
  # 行1 y=[3,6]
  - - [3.0, 3.0]
    - [5.0, 3.0]
    - [5.0, 6.0]
    - [3.0, 6.0]
