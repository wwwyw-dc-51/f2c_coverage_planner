    - [15.5, 6.0]
    - [13.5, 6.0]
  # 行2 y=[7.5,10.5]
  - - [3.0, 7.5]
    - [5.0, 7.5]
    - [5.0, 10.5]
    - [3.0, 10.5]
  - - [6.5, 7.5]
    - [8.5, 7.5]
    - [8.5, 10.5]
    - [6.5, 10.5]
  - - [10.0, 7.5]
