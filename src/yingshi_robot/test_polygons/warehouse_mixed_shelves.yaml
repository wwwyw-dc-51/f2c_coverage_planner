# 仓库 + 混合朝向货架 —— 部分竖直、部分水平，最考验算法
#
# 整体仓库 30x20 = 600 m²
# 左半区(0-15): 3条竖直货架（通道竖直）
# 右半区(15-30): 2条水平货架（通道水平）
# 有效面积 ≈ 600 - 货架面积
#
# 几何布局（仓库 30宽 x 20高）:
#   左半竖直货架:
#     货架1: x=[3,4.5],   y=[3,17]
#     货架2: x=[8,9.5],   y=[3,17]
#     货架3: x=[13,14.5], y=[3,17]
#   右半水平货架:
#     货架4: x=[17,28], y=[5,6.5]
#     货架5: x=[17,28], y=[13,14.5]
#
# 特点：这是最刁钻的场景——左半通道竖直、右半通道水平
#   无论全局统一成竖直还是水平，都有一半区域被切错
#   测试全局统一策略的失败边界
polygon:
  - [0.0, 0.0]
  - [30.0, 0.0]
  - [30.0, 20.0]
  - [0.0, 20.0]

holes:
  - - [3.0, 3.0]
    - [4.5, 3.0]
    - [4.5, 17.0]
    - [3.0, 17.0]
  - - [8.0, 3.0]
    - [9.5, 3.0]
    - [9.5, 17.0]
    - [8.0, 17.0]
  - - [13.0, 3.0]
    - [14.5, 3.0]
    - [14.5, 17.0]
    - [13.0, 17.0]
  - - [17.0, 5.0]
    - [28.0, 5.0]
    - [28.0, 6.5]
    - [17.0, 6.5]
  - - [17.0, 13.0]
    - [28.0, 13.0]
    - [28.0, 14.5]
    - [17.0, 14.5]
