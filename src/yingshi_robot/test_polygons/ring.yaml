# 回字形（环形）区域 —— 外框包围内洞，中间是一条环形通道
#
# 整体外框 20x20 = 400 m²，中间挖掉 12x12 = 144 m² 的内洞
# 有效面积 = 400 - 144 = 256 m²
#
# 几何：
#   外框: [0,0]-[20,0]-[20,20]-[0,20]  (整体 20x20)
#   内洞: x=[4,16], y=[4,16]  (12x12 居中)
#   环形通道宽 4m（外框到洞的间距，每边一致）
#
# 特点：纯环形通道，没有"主方向"——上/下/左/右四段通道首尾相连成环。
#   预期：最考验路由。swath 在四段通道里方向各不相同（上/下段水平，左/右段竖直），
#   路由要么有序绕圈扫完，要么在环上来回横跳。看相邻贪心在环路结构上的表现。
polygon:
  - [0.0, 0.0]
  - [20.0, 0.0]
  - [20.0, 20.0]
  - [0.0, 20.0]

holes:
  - - [4.0, 4.0]
    - [16.0, 4.0]
    - [16.0, 16.0]
    - [4.0, 16.0]
