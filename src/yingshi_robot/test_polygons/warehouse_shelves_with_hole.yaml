# 仓库 + 货架 + 中间空洞 —— 最贴近真实场景
#
# 30x20 仓库，左侧4条竖直货架，右侧开阔区中间有一个大空洞（设备/柱区）
# 整体 600 m² - 货架66 - 空洞60 = 474 m²
#
# 几何布局（仓库 30宽 x 20高）:
#   竖直货架(左侧): 4条 1.5宽x11长
#     货架1: x=[3,4.5],   y=[4,15]
#     货架2: x=[7,8.5],   y=[4,15]
#     货架3: x=[11,12.5], y=[4,15]
#     货架4: x=[15,16.5], y=[4,15]
#   中间空洞(右侧开阔区): 6x10 设备区
#     空洞: x=[20,26], y=[6,16]
#
# 特点：左侧货架区(通道竖直规整) + 右侧开阔区(中间一个空洞)
#   预期：货架区整齐(竖直通道)，空洞周围出现方向混乱的碎片
polygon:
  - [0.0, 0.0]
  - [30.0, 0.0]
  - [30.0, 20.0]
  - [0.0, 20.0]

holes:
  # 4条竖直货架
  - - [3.0, 4.0]
    - [4.5, 4.0]
    - [4.5, 15.0]
    - [3.0, 15.0]
  - - [7.0, 4.0]
    - [8.5, 4.0]
    - [8.5, 15.0]
    - [7.0, 15.0]
  - - [11.0, 4.0]
    - [12.5, 4.0]
    - [12.5, 15.0]
    - [11.0, 15.0]
  - - [15.0, 4.0]
    - [16.5, 4.0]
    - [16.5, 15.0]
    - [15.0, 15.0]
  # 中间空洞（设备区）
  - - [20.0, 6.0]
    - [26.0, 6.0]
    - [26.0, 16.0]
    - [20.0, 16.0]
