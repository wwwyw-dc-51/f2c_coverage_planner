# 大型仓库 —— 60x40 大场景，8 个货架混合布局（左区纵向、右区横向）
#
# 整体 60x40 = 2400 m²
# 左区(x∈[0,30])：4 个纵向货架(2x12)，货架间通道是纵向长条
# 右区(x∈[30,60])：4 个横向货架(12x2)，货架间通道是横向长条
# 右上角(x∈[47,60])留开阔区
# 货架总面积 = 8 x (2x12) = 192 m²
# 有效面积 = 2400 - 192 = 2208 m²
#
# 特点：大场景 + 混合方向，最考验算法：
#   - 左区通道纵向(swath 应竖向)，右区通道横向(swath 应水平)
#   - 算法能否在大场景下让每块自适应各自最长边方向
#   - hole 切分对 8 个 hole 的表现(会不会切出过多碎片)
polygon:
  - [0.0, 0.0]
  - [60.0, 0.0]
  - [60.0, 40.0]
  - [0.0, 40.0]

holes:
  # 左区：4 个纵向货架(2 宽 x 12 高)，通道纵向
  - - [3.0, 4.0]
    - [5.0, 4.0]
    - [5.0, 16.0]
    - [3.0, 16.0]
  - - [10.0, 4.0]
    - [12.0, 4.0]
    - [12.0, 16.0]
    - [10.0, 16.0]
  - - [17.0, 4.0]
    - [19.0, 4.0]
    - [19.0, 16.0]
    - [17.0, 16.0]
  - - [24.0, 4.0]
    - [26.0, 4.0]
    - [26.0, 16.0]
    - [24.0, 16.0]
  # 右区：4 个横向货架(12 宽 x 2 高)，通道横向
  - - [33.0, 5.0]
    - [45.0, 5.0]
    - [45.0, 7.0]
    - [33.0, 7.0]
  - - [33.0, 12.0]
    - [45.0, 12.0]
    - [45.0, 14.0]
    - [33.0, 14.0]
  - - [33.0, 19.0]
    - [45.0, 19.0]
    - [45.0, 21.0]
    - [33.0, 21.0]
  - - [33.0, 26.0]
    - [45.0, 26.0]
    - [45.0, 28.0]
    - [33.0, 28.0]
