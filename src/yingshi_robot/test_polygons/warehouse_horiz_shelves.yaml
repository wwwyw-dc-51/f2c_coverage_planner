# 仓库 + 水平货架 —— 货架改成横向摆放，通道变成水平方向
#
# 整体仓库 30x15 = 450 m²
# 3 组货架，水平方向排列（横向长条），测试全局统一策略能否自动选水平方向
# 货架: 11m长 x 1.5m宽，水平摆放
# 货架总面积 = 3 x (11 x 1.5) = 49.5 m²
# 有效作业面积 = 450 - 49.5 = 400.5 m²
#
# 几何布局（仓库 30宽 x 15高）:
#   货架1: x=[2,13],   y=[3, 4.5]   (水平长条)
#   货架2: x=[2,13],   y=[7, 8.5]
#   货架3: x=[2,13],   y=[11,12.5]
#   右侧 x=[15,30] 留开阔区
#
# 特点：通道是水平的（货架之间），如果全局统一成竖直就完全错了
#   预期：全局统一策略应自动选水平（整体最长边方向）
polygon:
  - [0.0, 0.0]
  - [30.0, 0.0]
  - [30.0, 15.0]
  - [0.0, 15.0]

holes:
  - - [2.0, 3.0]
    - [13.0, 3.0]
    - [13.0, 4.5]
    - [2.0, 4.5]
  - - [2.0, 7.0]
    - [13.0, 7.0]
    - [13.0, 8.5]
    - [2.0, 8.5]
  - - [2.0, 11.0]
    - [13.0, 11.0]
    - [13.0, 12.5]
    - [2.0, 12.5]
