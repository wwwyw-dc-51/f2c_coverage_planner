# 门字形（Π形）区域 —— 矩形挖掉中下部，三面包围
#
# 整体外框 24x18 = 432 m²，挖掉中间下部 16x12 = 192 m²
# 有效面积 = 432 - 192 = 240 m²
#
# 几何：
#   外框: [0,0]-[24,0]-[24,18]-[0,18]
#   门形: 上横条(0-24, 12-18) + 左竖条(0-4, 0-12) + 右竖条(20-24, 0-12)
#   挖空: x=[4,20], y=[0,12] (16宽 x 12高)
#
# 特点：类似 U 形但开口朝下，顶部有连通的横条
#   用外多边形+内洞的方式表达（矩形外框挖一个矩形洞）
polygon:
  - [0.0, 0.0]
  - [24.0, 0.0]
  - [24.0, 18.0]
  - [0.0, 18.0]

holes:
  - - [4.0, 0.0]
    - [20.0, 0.0]
    - [20.0, 12.0]
    - [4.0, 12.0]
