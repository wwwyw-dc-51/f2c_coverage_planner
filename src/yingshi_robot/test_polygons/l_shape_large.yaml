# 大 L 型区域 —— 长宽比悬殊，测试"被强制沿短边铺"的代价
#
# 左竖条: 8x30 = 240 m² (竖直长条，长宽比 30/8 = 3.75)
# 上横条: 22x10 = 220 m² (水平长条)
# 重叠: 8x10 = 80 m²
# 有效面积 = 240 + 220 - 80 = 380 m²
#
# 特点：两条长宽比悬殊、且朝向垂直的长条。
#   - 如果全局统一成水平：左竖条(8x30)被横切，产生大量短条
#   - 如果全局统一成竖直：上横条(22x10)被竖切，同样碎
#   这是验证"全局统一代价"的极端场景
polygon:
  - [0.0, 0.0]
  - [8.0, 0.0]
  - [8.0, 20.0]
  - [30.0, 20.0]
  - [30.0, 30.0]
  - [0.0, 30.0]

holes: []
